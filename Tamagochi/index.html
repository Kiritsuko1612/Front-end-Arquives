<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamagochi - Foxy 🦊</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            transition: filter 1.5s ease, background-image 1.5s ease;
        }
        #mainImage {
            transition: opacity 0.3s ease;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.3));
        }
        #btnImage {
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25));
            transition: transform 0.15s ease;
        }
        #btnImage:hover {
            transform: scale(1.08);
        }
        #btnImage:active {
            transform: scale(0.93);
        }
    </style>
</head>
<body
    class="min-h-screen flex flex-col"
    style="
        background-image: url('cenary_foxy.png');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    "
>

    <!-- Header: avatar + nome + toggle dia/noite -->
    <div class="w-full flex items-center justify-start p-4 gap-4 bg-base-100/40 backdrop-blur-sm">
        <div class="avatar">
            <div class="w-16 rounded-full ring ring-warning ring-offset-base-100 ring-offset-2">
                <img src="eating_foxy.png" alt="Avatar Foxy" />
            </div>
        </div>

        <input
            type="text"
            id="nomeCriatura"
            placeholder="Nome da criatura..."
            class="input input-secondary input-bordered w-48"
        />

        <!-- Indicador de fome -->
        <div class="flex flex-col gap-1 ml-2">
            <span class="text-xs font-bold text-base-content/80">Fome</span>
            <progress id="barraFome" class="progress progress-warning w-32" value="0" max="20"></progress>
        </div>

        <!-- Toggle Dia / Noite -->
        <div class="ml-auto flex items-center gap-2 bg-base-100/60 rounded-full px-3 py-1">
            <span class="text-lg">☀️</span>
            <input
                type="checkbox"
                id="toggleNoite"
                class="toggle toggle-primary"
                onchange="toggleModoNoite(this.checked)"
            />
            <span class="text-lg">🌙</span>
        </div>
    </div>

    <!-- Conteúdo principal -->
    <div class="flex flex-col items-center w-full px-4 flex-1 justify-center">

        <!-- Status badge -->
        <div class="badge badge-lg badge-warning mb-4 font-bold text-base shadow" id="statusBadge">
            😊 Normal
        </div>

        <!-- Imagem principal da criatura -->
        <img
            id="mainImage"
            src="normal_foxy.png"
            alt="Foxy - Bichinho Virtual"
            class="w-full max-w-xs h-auto"
        />

        <!-- Botão de alimentar -->
        <div class="mt-10 flex justify-center w-full">
            <img
                id="btnImage"
                src="alimento_foxy.png"
                alt="Alimentar Foxy"
                class="w-1/3 max-w-[160px] h-auto cursor-pointer"
                onclick="alimentar()"
                title="Clique para alimentar!"
            />
        </div>

    </div>

    <!-- Card do Prof. Ferlini - canto inferior esquerdo -->
    <div
        onclick="mostrarFerlini()"
        title="Falar com o Prof. Ferlini"
        style="
            position: fixed;
            bottom: 20px;
            left: 20px;
            cursor: pointer;
            z-index: 50;
            transition: transform 0.2s ease;
        "
        onmouseenter="this.style.transform='scale(1.08)'"
        onmouseleave="this.style.transform='scale(1)'"
    >
        <div class="flex items-end gap-2">
            <!-- Balãozinho -->
            <div class="bg-base-100/90 backdrop-blur-sm rounded-2xl rounded-bl-none px-3 py-2 shadow-lg max-w-[130px] mb-1">
                <p class="text-xs font-semibold text-base-content leading-tight">Precisa de ajuda? 😎</p>
            </div>
            <!-- Avatar foto -->
            <div class="avatar">
                <div class="w-14 rounded-full ring-2 ring-primary ring-offset-2 ring-offset-base-100/0 shadow-xl">
                    <img src="ferlini_foto.jpg" alt="Prof. Ferlini" />
                </div>
            </div>
        </div>
        <p class="text-center text-xs font-bold text-white drop-shadow mt-1">Prof. Ferlini</p>
    </div>

    <!-- Modal Ferlini -->
    <dialog id="ferliniModal" class="modal">
        <div class="modal-box text-center max-w-sm">
            <div class="avatar mb-3">
                <div class="w-24 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2 mx-auto">
                    <img src="ferlini_foto.jpg" alt="Prof. Ferlini" />
                </div>
            </div>
            <h3 class="font-bold text-xl">Prof. Ferlini</h3>
            <p class="text-sm text-base-content/50 italic mb-1">vulgo Gostosinho</p>
            <div class="divider my-2"></div>
            <div class="chat chat-start text-left">
                <div class="chat-bubble chat-bubble-primary text-sm">
                    Parabéns por implementar o Tamagochi! Agora vai lá subir no Git antes que eu te reprove. 😄
                </div>
            </div>
            <div class="modal-action justify-center mt-4">
                <form method="dialog">
                    <button class="btn btn-primary btn-sm">Entendido, professor! 🫡</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>fechar</button>
        </form>
    </dialog>

    <script src="tamagochi.js"></script>
</body>
</html>
